services:
  - type: web
    name: study-buddy-ai
    env: python
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      cd frontend &&
      npm ci &&
      npm run build
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
